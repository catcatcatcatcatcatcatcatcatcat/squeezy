name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Verify squeezy imports and --help works on all platforms
  smoke:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install .
      - run: squeezy --help

  # Full integration tests against real LMS (Linux only — needs Docker)
  integration:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.14"]

    services:
      lms:
        image: lmscommunity/lyrionmusicserver:latest
        ports:
          - 9000:9000
          - 3483:3483
          - 9090:9090
        volumes:
          - /tmp/lms-music:/music
        options: >-
          --health-cmd "curl -f http://localhost:9000/ || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
          --health-start-period 60s

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q ffmpeg pulseaudio
          pulseaudio --start --exit-idle-time=-1
          pactl load-module module-null-sink sink_name=test_sink

      - name: Install squeezy and test deps
        run: pip install -e ".[test]"

      - name: Create music directory
        run: sudo chmod 777 /tmp/lms-music

      - name: Wait for LMS
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/ > /dev/null && echo "LMS ready" && exit 0
            sleep 2
          done
          echo "LMS failed to start" && exit 1

      - name: Run tests
        env:
          LMS_HOST: localhost
          LMS_MUSIC_DIR: /tmp/lms-music
          LMS_MUSIC_PATH: /music
          PULSE_SINK: test_sink
        run: pytest tests/ -v --timeout=60
