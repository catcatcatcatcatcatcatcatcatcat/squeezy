name: Update Homebrew tap

on:
  push:
    tags:
      - 'v*'

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Compute tarball sha256
        id: tarball
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/catcatcatcatcatcatcatcatcatcat/squeezy/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)
          echo "tag=$TAG"   >> $GITHUB_OUTPUT
          echo "url=$URL"   >> $GITHUB_OUTPUT
          echo "sha=$SHA"   >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: catcatcatcatcatcatcatcatcatcat/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        env:
          TAG: ${{ steps.tarball.outputs.tag }}
          URL: ${{ steps.tarball.outputs.url }}
          SHA: ${{ steps.tarball.outputs.sha }}
        run: |
          python3 - <<'EOF'
          import re, os

          tag = os.environ['TAG']
          url  = os.environ['URL']
          sha  = os.environ['SHA']

          with open('Formula/squeezy.rb') as f:
              content = f.read()

          # Update first url line only (not the resource urls below it)
          content = re.sub(
              r'(?m)^(\s+url ")[^"]+(")',
              f'\\g<1>{url}\\2',
              content, count=1
          )

          # Update first sha256 line only (not the resource sha256s below it)
          content = re.sub(
              r'(?m)^(\s+sha256 ")[0-9a-f]+(")',
              f'\\g<1>{sha}\\2',
              content, count=1
          )

          with open('Formula/squeezy.rb', 'w') as f:
              f.write(content)

          print(f"Updated to {tag}")
          print(f"  url:    {url}")
          print(f"  sha256: {sha}")
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squeezy.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: release ${{ github.ref_name }}"
          git push
