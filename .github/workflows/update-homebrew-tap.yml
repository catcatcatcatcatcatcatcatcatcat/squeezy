name: Update Homebrew tap

on:
  push:
    tags:
      - 'v*'

jobs:
  update-tap:
    runs-on: macos-latest
    steps:
      - name: Checkout squeezy (for pyproject.toml version)
        uses: actions/checkout@v4

      - name: Compute tarball sha256
        id: tarball
        run: |
          TAG="${{ github.ref_name }}"
          URL="https://github.com/catcatcatcatcatcatcatcatcatcat/squeezy/archive/refs/tags/${TAG}.tar.gz"
          SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: catcatcatcatcatcatcatcatcatcat/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update source url and sha256
        env:
          TAG: ${{ steps.tarball.outputs.tag }}
          URL: ${{ steps.tarball.outputs.url }}
          SHA: ${{ steps.tarball.outputs.sha }}
        run: |
          python3 - <<'EOF'
          import re, os

          url = os.environ['URL']
          sha = os.environ['SHA']

          with open('homebrew-tap/Formula/squeezy.rb') as f:
              content = f.read()

          # Update first url line only (not the resource urls below it)
          content = re.sub(
              r'(?m)^(\s+url ")[^"]+(")',
              f'\\g<1>{url}\\2',
              content, count=1
          )

          # Update first sha256 line only (not the resource sha256s below it)
          content = re.sub(
              r'(?m)^(\s+sha256 ")[0-9a-f]+(")',
              f'\\g<1>{sha}\\2',
              content, count=1
          )

          with open('homebrew-tap/Formula/squeezy.rb', 'w') as f:
              f.write(content)

          print(f"url:    {url}")
          print(f"sha256: {sha}")
          EOF

      - name: Refresh Python dependency resources
        run: |
          # brew update-python-resources re-resolves all resource blocks to latest
          # compatible versions with correct sha256s — no manual pinning needed.
          brew update-python-resources homebrew-tap/Formula/squeezy.rb

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          # Extract version number (strip leading 'v')
          VERSION="${TAG#v}"
          gh release create "$TAG" \
            --repo catcatcatcatcatcatcatcatcatcat/squeezy \
            --title "squeezy $TAG" \
            --notes "See [CHANGELOG](https://github.com/catcatcatcatcatcatcatcatcatcat/squeezy/commits/$TAG) for what changed in this release." \
            --verify-tag

      - name: Commit and push tap update
        working-directory: homebrew-tap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/squeezy.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: release ${{ github.ref_name }}"
          git push
